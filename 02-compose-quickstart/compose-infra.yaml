services:
  redis:
    image: redis:alpine
    hostname: redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - redis_net

volumes:
  redis-data:

networks:
  redis_net:
    name: redis_net
    external: false